<head>

        <h1>🚀 Modern JS (ES6+)</h1>
        <p>Buka <b>Console (F12)</b> untuk melihat hasil pengolahan data menggunakan ES6+.</p>
        
        <div id="userListContainer">
            <ul id="userList">
                <!-- Data akan muncul di sini via JavaScript -->
                <li>Menunggu data...</li>
            </ul>
        </div>

    <!-- Menghubungkan ke JS -->
    <script src="index.js"></script>
