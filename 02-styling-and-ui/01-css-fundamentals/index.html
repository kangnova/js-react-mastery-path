<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Mastery - Tahap 2: CSS Fundamentals</title>
    <!-- Menghubungkan ke CSS Utama -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>📐 CSS Fundamentals: Box Model & Flexbox</h1>
        <p>Gunakan file ini untuk bereksperimen dengan tata letak (layout) menggunakan CSS Dasar.</p>

        <!-- Latihan Box Model -->
        <section class="box-model-demo">
            <div class="box">Box Model Demo</div>
        </section>

        <!-- Latihan Flexbox -->
        <section class="flex-container">
            <div class="flex-item">Item 1</div>
            <div class="flex-item">Item 2</div>
            <div class="flex-item">Item 3</div>
        </section>

        <!-- Latihan Membuat Card Layout -->
        <section class="card-section">
            <div class="card">
                <div class="card-image"></div>
                <div class="card-content">
                    <h3>Frontend Development</h3>
                    <p>Belajar UI/UX modern dengan Flexbox dan CSS Grid untuk hasil yang responsif.</p>
                    <button class="card-btn">Detail</button>
                </div>
            </div>
        </section>
    </div>
</body>
</html>
